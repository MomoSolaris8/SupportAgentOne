name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile backend
        run: python -m compileall -q src/backend/supportagent

      - name: Run backend tests
        env:
          CHAT_MODEL: qwen-plus
          CHAT_MODELS: qwen-plus,qwen-max,qwen3-max
          EMBEDDING_API_KEY: ci-placeholder
          EMBEDDING_BASE_URL: https://example.invalid/v1
          DATABASE_URL: postgresql://supportagent:supportagent@localhost:5432/supportagent
          MCP_DYNAMIC_TOOLS_ENABLED: "false"
        run: python -m pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t supportagent-backend:ci .

      - name: Build frontend image
        run: docker build -f src/frontend/Dockerfile -t supportagent-frontend:ci src/frontend
