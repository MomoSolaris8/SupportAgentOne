services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: supportagent
      POSTGRES_PASSWORD: supportagent
      POSTGRES_DB: supportagent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://supportagent:supportagent@postgres:5432/supportagent
      AUTH_COOKIE_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    profiles:
      - app

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_API_URL: http://backend:8000
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - backend
    profiles:
      - app

volumes:
  pgdata:
